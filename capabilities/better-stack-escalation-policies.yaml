        readOnly: false
        destructive: false
        idempotent: false
      call: better-stack-escalation-policies.createescalationpolicy
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: better-stack-get-escalation-policy
      description: Better Stack Get Escalation Policy
      hints:
