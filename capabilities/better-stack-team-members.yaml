naftiko: 1.0.0-alpha2
info:
  label: Better Stack API — Team Members
  description: 'Better Stack API — Team Members. 4 operations. Lead operation: Better Stack List Team Members. Self-contained
    Naftiko capability covering one Better Stack business surface.'
  tags:
  - Better Stack
  - Team Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BETTER_STACK_API_KEY: BETTER_STACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: better-stack-team-members
    baseUri: https://uptime.betterstack.com/api/v2
    description: Better Stack API — Team Members business capability. Self-contained, no shared references.
    resources:
    - name: team-members
      path: /team-members
      operations:
      - name: listteammembers
        method: GET
        description: Better Stack List Team Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: team_name
          in: query
          type: string
          description: Filter by team name when using a global API token.
        - name: email
          in: query
          type: string
          description: Filter by member email address.
      - name: inviteteammember
        method: POST
        description: Better Stack Invite Team Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: team-members-id
      path: /team-members/{id}
      operations:
      - name: getteammember
        method: GET
        description: Better Stack Get Team Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the team member.
          required: true
      - name: deleteteammember
        method: DELETE
        description: Better Stack Delete Team Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the team member.
          required: true
    authentication:
      type: bearer
      token: '{{env.BETTER_STACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: better-stack-team-members-rest
    port: 8080
    description: REST adapter for Better Stack API — Team Members. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/team-members
      name: team-members
      description: REST surface for team-members.
      operations:
      - method: GET
        name: listteammembers
        description: Better Stack List Team Members
        call: better-stack-team-members.listteammembers
        with:
          team_name: rest.team_name
          email: rest.email
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: inviteteammember
        description: Better Stack Invite Team Member
        call: better-stack-team-members.inviteteammember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team-members/{id}
      name: team-members-id
      description: REST surface for team-members-id.
      operations:
      - method: GET
        name: getteammember
        description: Better Stack Get Team Member
        call: better-stack-team-members.getteammember
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteteammember
        description: Better Stack Delete Team Member
        call: better-stack-team-members.deleteteammember
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: better-stack-team-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Better Stack API — Team Members. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: better-stack-list-team-members
      description: Better Stack List Team Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: better-stack-team-members.listteammembers
      with:
        team_name: tools.team_name
        email: tools.email
      outputParameters:
      - type: object
        mapping: $.
    - name: better-stack-invite-team-member
      description: Better Stack Invite Team Member
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: better-stack-team-members.inviteteammember
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: better-stack-get-team-member
      description: Better Stack Get Team Member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: better-stack-team-members.getteammember
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: better-stack-delete-team-member
      description: Better Stack Delete Team Member
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: better-stack-team-members.deleteteammember
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
