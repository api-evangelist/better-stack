components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Bearer token authentication. Use a global API token or a team-scoped
        Uptime API token obtained from Better Stack Settings → API tokens.
  schemas:
    Pagination:
      title: Pagination
      description: Pagination links for list responses following JSON:API specification.
      type: object
      properties:
        first:
          type: string
          format: uri
          description: URL of the first page.
          example: https://uptime.betterstack.com/api/v2/monitors?page=1
        last:
          type: string
          format: uri
          description: URL of the last page.
          example: https://uptime.betterstack.com/api/v2/monitors?page=5
        prev:
          type: string
          format: uri
          nullable: true
          description: URL of the previous page, or null.
          example: null
        next:
          type: string
          format: uri
          nullable: true
          description: URL of the next page, or null.
          example: https://uptime.betterstack.com/api/v2/monitors?page=2
    ErrorResponse:
      title: Error Response
      description: Standard error response.
      type: object
      properties:
        errors:
          type: array
          description: List of error details.
          items:
            type: object
            properties:
              title:
                type: string
                description: Human-readable error title.
                example: Unauthorized
              detail:
                type: string
                description: Detailed error message.
                example: Invalid API token
    MonitorAttributes:
      title: Monitor Attributes
      description: Attributes of an uptime monitor.
      type: object
      properties:
        url:
          type: string
          format: uri
          description: The URL being monitored.
          example: https://example.com
        pronounceable_name:
          type: string
          description: Human-readable name for the monitor.
          example: Production API
        monitor_type:
          type: string
          description: Type of monitoring check.
          enum:
            - status
            - expected_status_code
            - keyword
            - keyword_absence
            - ping
            - tcp
            - udp
            - smtp
            - pop
            - imap
          example: status
        status:
          type: string
          description: Current operational status of the monitor.
          enum:
            - paused
            - pending
            - maintenance
            - up
            - validating
            - down
          example: up
        monitor_group_id:
          type: string
          nullable: true
          description: ID of the monitor group this monitor belongs to.
          example: null
        policy_id:
          type: string
          nullable: true
          description: ID of the escalation policy for this monitor.
          example: "300010"
        check_frequency:
          type: integer
          description: How often to check the URL in seconds.
          example: 180
        verify_ssl:
          type: boolean
          description: Whether to verify SSL certificate validity.
          example: true
        ssl_expiration:
          type: integer
          nullable: true
          description: Days before SSL expiration to start alerting.
          example: 30
        call:
          type: boolean
          description: Whether to alert via phone call.
          example: false
        sms:
          type: boolean
          description: Whether to alert via SMS.
          example: true
        email:
          type: boolean
          description: Whether to alert via email.
          example: true
        push:
          type: boolean
          description: Whether to alert via push notification.
          example: true
        regions:
          type: array
          description: Geographic regions from which to check the monitor.
          items:
            type: string
          example:
            - us
            - eu
        created_at:
          type: string
          format: date-time
          description: When the monitor was created.
          example: "2025-01-15T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: When the monitor was last updated.
          example: "2026-04-01T08:30:00Z"
        paused_at:
          type: string
          format: date-time
          nullable: true
          description: When the monitor was paused, if applicable.
          example: null
    MonitorObject:
      title: Monitor Object
      description: A single monitor resource following JSON:API format.
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the monitor.
          example: "500123"
        type:
          type: string
          description: Resource type identifier.
          example: monitor
        attributes:
          $ref: '#/components/schemas/MonitorAttributes'
    MonitorListResponse:
      title: Monitor List Response
      description: Paginated list of monitors.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MonitorObject'
        pagination:
          $ref: '#/components/schemas/Pagination'
    MonitorSingleResponse:
      title: Monitor Single Response
      description: Single monitor response.
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MonitorObject'
    MonitorCreateRequest:
      title: Monitor Create Request
      description: Request body for creating a new monitor.
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: The URL to monitor.
          example: https://example.com
        pronounceable_name:
          type: string
          description: Human-readable name for the monitor.
          example: Production API
        monitor_type:
          type: string
          description: Type of monitoring check.
          enum:
            - status
            - expected_status_code
            - keyword
            - keyword_absence
            - ping
            - tcp
          example: status
        check_frequency:
          type: integer
          description: Check interval in seconds.
          example: 180
        verify_ssl:
          type: boolean
          description: Whether to verify SSL certificate.
          example: true
        email:
          type: boolean
          description: Alert via email.
          example: true
        sms:
          type: boolean
          description: Alert via SMS.
          example: false
        call:
          type: boolean
          description: Alert via phone call.
          example: false
        push:
          type: boolean
          description: Alert via push notification.
          example: true
        regions:
          type: array
          items:
            type: string
          description: Regions to monitor from.
          example:
            - us
            - eu
        policy_id:
          type: string
          nullable: true
          description: Escalation policy ID.
          example: "300010"
    MonitorUpdateRequest:
      title: Monitor Update Request
      description: Request body for updating an existing monitor (all fields optional).
      type: object
      properties:
        url:
          type: string
          format: uri
          description: New URL to monitor.
          example: https://example.com
        pronounceable_name:
          type: string
          description: New human-readable name.
          example: Updated API Monitor
        check_frequency:
          type: integer
          description: New check interval in seconds.
          example: 300
        verify_ssl:
          type: boolean
          description: SSL verification setting.
          example: true
        email:
          type: boolean
          description: Alert via email.
          example: true
        sms:
          type: boolean
          description: Alert via SMS.
          example: false
        call:
          type: boolean
          description: Alert via phone call.
          example: false
        push:
          type: boolean
          description: Alert via push notification.
          example: true
    ResponseTimesResponse:
      title: Response Times Response
      description: Response time metrics for a monitor.
      type: object
      properties:
        data:
          type: array
          description: Array of response time data points.
          items:
            type: object
            properties:
              at:
                type: string
                format: date-time
                description: Timestamp of the measurement.
                example: "2026-04-19T10:00:00Z"
              response_time:
                type: integer
                description: Response time in milliseconds.
                example: 142
              region:
                type: string
                description: Region where the check was performed.
                example: us
    AvailabilityResponse:
      title: Availability Response
      description: Availability summary metrics.
      type: object
      properties:
        data:
          type: object
          properties:
            availability:
              type: number
              description: Availability percentage.
              example: 99.98
            downtime_duration:
              type: integer
              description: Total downtime duration in seconds.
              example: 86
            number_of_incidents:
              type: integer
              description: Number of incidents in the period.
              example: 2
            longest_incident_duration:
              type: integer
              description: Duration of the longest incident in seconds.
              example: 61
            average_incident_duration:
              type: integer
              description: Average incident duration in seconds.
              example: 43
    HeartbeatAttributes:
      title: Heartbeat Attributes
      description: Attributes of a heartbeat monitor.
      type: object
      properties:
        name:
          type: string
          description: Human-readable name for the heartbeat.
          example: Daily Backup Job
        url:
          type: string
          format: uri
          description: The URL to ping to signal the heartbeat.
          example: https://uptime.betterstack.com/api/v1/heartbeat/abc123
        period:
          type: integer
          description: Expected period between heartbeat pings in seconds.
          example: 86400
        grace:
          type: integer
          description: Grace period in seconds before alerting.
          example: 3600
        status:
          type: string
          description: Current status of the heartbeat.
          enum:
            - paused
            - pending
            - up
            - down
          example: up
        call:
          type: boolean
          description: Alert via phone call.
          example: false
        sms:
          type: boolean
          description: Alert via SMS.
          example: false
        email:
          type: boolean
          description: Alert via email.
          example: true
        push:
          type: boolean
          description: Alert via push notification.
          example: true
        created_at:
          type: string
          format: date-time
          description: When the heartbeat was created.
          example: "2025-06-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: When the heartbeat was last updated.
          example: "2026-04-01T00:00:00Z"
        paused_at:
          type: string
          format: date-time
          nullable: true
          description: When the heartbeat was paused.
