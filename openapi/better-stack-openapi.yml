openapi: 3.0.3
info:
  title: Better Stack API
  description: >-
    Better Stack is a comprehensive infrastructure monitoring and observability platform
    combining uptime monitoring, log management, incident management, and status pages.
    The API covers both the Uptime (on-call, monitors, heartbeats, status pages) and
    Telemetry (logs, metrics, sources, dashboards, alerts) product areas.
  version: v2
  contact:
    name: Better Stack Support
    url: https://betterstack.com/docs/
  x-generated-from: documentation
servers:
  - url: https://uptime.betterstack.com/api/v2
    description: Better Stack Uptime API v2
  - url: https://uptime.betterstack.com/api/v3
    description: Better Stack Uptime API v3 (incidents, policies)
  - url: https://betterstack.com/api/v2
    description: Better Stack Telemetry API v2
security:
  - bearerAuth: []
tags:
  - name: Monitors
    description: Manage uptime monitors for URLs, APIs, and services
  - name: Heartbeats
    description: Manage heartbeat monitors for scheduled jobs and cron tasks
  - name: Incidents
    description: Manage incidents and on-call alerting
  - name: Status Pages
    description: Manage public and private status pages
  - name: Escalation Policies
    description: Manage escalation policies and on-call schedules
  - name: Team Members
    description: Manage team members and invitations
  - name: Sources
    description: Manage telemetry sources and collectors
  - name: Dashboards
    description: Manage telemetry dashboards
  - name: Alerts
    description: Manage telemetry alert rules
paths:
  /monitors:
    get:
      operationId: listMonitors
      summary: Better Stack List Monitors
      description: Returns a paginated list of all monitors for the authenticated team.
      tags:
        - Monitors
      parameters:
        - name: team_name
          in: query
          description: Filter monitors belonging to a specified team when using a global API token.
          required: false
          schema:
            type: string
          example: my-team
        - name: url
          in: query
          description: Filter monitors by target URL.
          required: false
          schema:
            type: string
          example: https://example.com
        - name: pronounceable_name
          in: query
          description: Filter monitors by pronounceable name.
          required: false
          schema:
            type: string
          example: Production API
      responses:
        '200':
          description: Paginated list of monitors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorListResponse'
              examples:
                ListMonitors200Example:
                  summary: Default listMonitors 200 response
                  x-microcks-default: true
                  value:
                    data:
                      - id: "123456"
                        type: monitor
                        attributes:
                          url: https://example.com
                          pronounceable_name: Production API
                          monitor_type: status
                          status: up
                          check_frequency: 180
                          verify_ssl: true
                          call: false
                          sms: true
                          email: true
                          push: true
                          regions:
                            - us
                            - eu
                          created_at: "2025-01-15T10:00:00Z"
                          updated_at: "2026-04-01T08:30:00Z"
                    pagination:
                      first: https://uptime.betterstack.com/api/v2/monitors?page=1
                      last: https://uptime.betterstack.com/api/v2/monitors?page=5
                      prev: null
                      next: https://uptime.betterstack.com/api/v2/monitors?page=2
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createMonitor
      summary: Better Stack Create Monitor
      description: Creates a new uptime monitor.
      tags:
        - Monitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorCreateRequest'
            examples:
              CreateMonitorRequestExample:
                summary: Default createMonitor request
                x-microcks-default: true
                value:
                  url: https://example.com
                  pronounceable_name: Production API
                  monitor_type: status
                  check_frequency: 180
                  verify_ssl: true
                  email: true
                  sms: false
                  call: false
                  push: true
                  regions:
                    - us
                    - eu
      responses:
        '201':
          description: Monitor created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorSingleResponse'
              examples:
                CreateMonitor201Example:
                  summary: Default createMonitor 201 response
                  x-microcks-default: true
                  value:
                    data:
                      id: "500123"
                      type: monitor
                      attributes:
                        url: https://example.com
                        pronounceable_name: Production API
                        monitor_type: status
                        status: pending
                        check_frequency: 180
                        verify_ssl: true
                        call: false
                        sms: false
                        email: true
                        push: true
                        regions:
                          - us
                          - eu
                        created_at: "2026-04-19T10:00:00Z"
                        updated_at: "2026-04-19T10:00:00Z"
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /monitors/{id}:
    get:
      operationId: getMonitor
      summary: Better Stack Get Monitor
      description: Returns a single monitor by ID.
      tags:
        - Monitors
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the monitor.
          schema:
            type: string
          example: "500123"
      responses:
        '200':
          description: Monitor details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorSingleResponse'
              examples:
                GetMonitor200Example:
                  summary: Default getMonitor 200 response
                  x-microcks-default: true
                  value:
                    data:
                      id: "500123"
                      type: monitor
                      attributes:
                        url: https://example.com
                        pronounceable_name: Production API
                        monitor_type: status
                        status: up
                        check_frequency: 180
                        verify_ssl: true
                        call: false
                        sms: true
                        email: true
                        push: true
                        regions:
                          - us
                          - eu
                        created_at: "2025-01-15T10:00:00Z"
                        updated_at: "2026-04-01T08:30:00Z"
        '404':
          description: Monitor not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      operationId: updateMonitor
      summary: Better Stack Update Monitor
      description: Updates an existing monitor.
      tags:
        - Monitors
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the monitor.
          schema:
            type: string
          example: "500123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorUpdateRequest'
            examples:
              UpdateMonitorRequestExample:
                summary: Default updateMonitor request
                x-microcks-default: true
                value:
                  pronounceable_name: Updated API Monitor
                  check_frequency: 300
      responses:
        '200':
          description: Monitor updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorSingleResponse'
              examples:
                UpdateMonitor200Example:
                  summary: Default updateMonitor 200 response
                  x-microcks-default: true
                  value:
                    data:
                      id: "500123"
                      type: monitor
                      attributes:
                        url: https://example.com
                        pronounceable_name: Updated API Monitor
                        monitor_type: status
                        status: up
                        check_frequency: 300
                        verify_ssl: true
                        call: false
                        sms: true
                        email: true
                        push: true
                        regions:
                          - us
                          - eu
                        created_at: "2025-01-15T10:00:00Z"
                        updated_at: "2026-04-19T10:00:00Z"
        '404':
          description: Monitor not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteMonitor
      summary: Better Stack Delete Monitor
      description: Deletes an existing monitor.
      tags:
        - Monitors
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the monitor.
          schema:
            type: string
          example: "500123"
      responses:
        '204':
          description: Monitor deleted successfully.
        '404':
          description: Monitor not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /monitors/{id}/response-times:
    get:
      operationId: getMonitorResponseTimes
